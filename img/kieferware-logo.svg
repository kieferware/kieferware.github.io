<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <!-- Text gradient: cyan → violet → hot pink -->
    <linearGradient id="vaporTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#01cdfe"/>
      <stop offset="48%"  stop-color="#b967ff"/>
      <stop offset="100%" stop-color="#ff71ce"/>
    </linearGradient>

    <!-- Diffuse glow behind text -->
    <filter id="glowBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" in="SourceGraphic"/>
    </filter>

    <!-- Crisp glow on text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sun gradient: pink → orange -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff71ce" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Clip sun to lower portion of canvas -->
    <clipPath id="sunClip">
      <rect x="200" y="188" width="400" height="92"/>
    </clipPath>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="800" height="280" fill="#0d0221"/>

  <!-- Faint horizontal scan lines -->
  <line x1="0" y1="70"  x2="800" y2="70"  stroke="#01cdfe" stroke-width="0.4" opacity="0.12"/>
  <line x1="0" y1="140" x2="800" y2="140" stroke="#01cdfe" stroke-width="0.4" opacity="0.12"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="#01cdfe" stroke-width="0.4" opacity="0.12"/>

  <!-- ─── Retro sun (bottom) ─── -->
  <circle cx="400" cy="280" r="125" fill="url(#sunGrad)" clip-path="url(#sunClip)"/>
  <!-- Horizontal stripe cutouts -->
  <rect x="200" y="228" width="400" height="7"  fill="#0d0221" opacity="0.9"/>
  <rect x="200" y="242" width="400" height="9"  fill="#0d0221" opacity="0.9"/>
  <rect x="200" y="258" width="400" height="11" fill="#0d0221" opacity="0.9"/>

  <!-- Horizon line glow -->
  <rect x="0" y="186" width="800" height="2" fill="#01cdfe" opacity="0.25"/>
  <rect x="0" y="188" width="800" height="1" fill="#ff71ce" opacity="0.45"/>

  <!-- ─── KieferWare text ─── -->
  <!-- Diffuse glow layer -->
  <text x="400" y="162"
        font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="900" text-anchor="middle"
        fill="#b967ff" filter="url(#glowBlur)" opacity="0.75"
        letter-spacing="2">KieferWare</text>

  <!-- Main text with crisp glow -->
  <text x="400" y="162"
        font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="900" text-anchor="middle"
        fill="url(#vaporTextGrad)" filter="url(#textGlow)"
        letter-spacing="2">KieferWare</text>
</svg>
